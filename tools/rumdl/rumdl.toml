# Default rumdl configuration.
# Used when the project has no rumdl config of its own at the git root.

[global]
# MD034: leave bare URLs/emails untouched (no <...> wrapping).
# MD036: don't rewrite bold-only paragraphs (e.g. **Example:**) into headings.
# MD040: don't require or auto-fill fenced code block languages.
disable = ["MD034", "MD036", "MD040"]

# Generated by release-please; never reformat the repo-root changelog.
exclude = ["/CHANGELOG.md"]

[MD013]
line-length = 80
reflow = true
